# Path to your AA marker FASTA (Dataset2)
aa_fasta: "Dataset2.AA.microcoleus.and.GenBank.fa"

# Assembly directory (can be a symlink like "assembly")
assembly_dir: "/prj/DECODE/EA_DATA/assembly"

# Where outputs go
outdir: "microcoleus_abundance_out"

# Which assembly FASTA extensions to scan
fasta_exts: ["fasta", "fa", "fna"]

# Parallelisation
total_cores: 64

# Tool parameters
diamond:
  evalue: "1e-10"
  query_cover: 50
  max_target_seqs: 1

# Existing conda env that provides diamond + samtools.
# Use the full path so conda run works regardless of env name resolution.
# Verified: respipe has diamond 2.1.8 and samtools 1.6
conda_env: "/hdd0/susbus/tools/conda_envs/respipe"
